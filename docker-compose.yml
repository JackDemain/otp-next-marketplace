services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: otp-next-app:latest
    container_name: otp-next-app
    restart: unless-stopped
    network_mode: host
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - app_storage:/app/storage

  postgres:
    image: postgres:16-alpine
    container_name: otp-next-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - otp_next_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  otp_next_pg_data:
    name: otp_next_pg_data
  app_storage:
    name: otp_next_app_storage
