server:
  port: ${SERVER_PORT:3000}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain,text/css,application/javascript
    min-response-size: 1024

spring:
  application:
    name: otp-next

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/otp_next}
    username: ${SPRING_DATASOURCE_USERNAME:otp_next}
    password: ${SPRING_DATASOURCE_PASSWORD:otp_next}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    open-in-view: false
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:CHANGE_ME_IN_PROD_MIN_32_CHARS_LONG_SECRET}
    expiration-ms: 86400000
  auth:
    login: ${APP_AUTH_LOGIN:otp}
    password: ${APP_AUTH_PASSWORD:otp123}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    com.otpnext: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
